<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #130f24, #1c1535); color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .hidden { display: none !important; }

        /* Màn hình 1 */
        #setup-screen { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.5); animation: fadeIn 1s ease; }
        #setup-screen h1 { margin-bottom: 20px; font-size: 28px; background: linear-gradient(to right, #ff8a00, #e52e71); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .input-group { margin-bottom: 20px; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: none; background: rgba(255, 255, 255, 0.1); color: white; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { background: rgba(255, 255, 255, 0.2); box-shadow: 0 0 10px rgba(229, 46, 113, 0.5); }
        button { padding: 15px 30px; border-radius: 30px; border: none; background: linear-gradient(45deg, #ff8a00, #e52e71); color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(229, 46, 113, 0.4); }

        /* Màn hình 2 */
        #cake-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100%; position: relative; }
        .birthday-text { font-family: 'Pacifico', cursive; font-size: 60px; color: #ff9d00; text-shadow: 0 0 20px rgba(255, 157, 0, 0.8), 0 0 40px rgba(229, 46, 113, 0.6); position: absolute; top: 15%; opacity: 0; transform: translateY(20px) scale(0.8); transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center; z-index: 10; }
        .show-text { opacity: 1; transform: translateY(0) scale(1); }
        .instructions { position: absolute; bottom: 10%; font-size: 20px; color: rgba(255, 255, 255, 0.7); animation: pulse 2s infinite; }

        /* Bánh và nến */
        .cake-container { position: relative; margin-top: 100px; }
        .candles { display: flex; justify-content: center; gap: 15px; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); z-index: 2; width: 80%; flex-wrap: wrap; }
        .candle { width: 12px; height: 50px; background: repeating-linear-gradient(45deg, #fff, #fff 5px, #ff5e62 5px, #ff5e62 10px); border-radius: 3px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.2); margin-bottom: -10px; }
        .flame { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); width: 16px; height: 28px; background: radial-gradient(ellipse at center, #fff 0%, #ffdf00 20%, #ff8c00 60%, rgba(255,0,0,0) 100%); border-radius: 50% 50% 20% 20%; box-shadow: 0 0 15px #ffdf00, 0 0 30px #ff8c00; animation: flicker 0.1s infinite alternate; transform-origin: bottom center; transition: all 0.5s ease; }
        
        /* Hiệu ứng */
        @keyframes flicker { 0% { transform: translateX(-50%) scale(1) rotate(-1deg); opacity: 0.9; } 100% { transform: translateX(-50%) scale(1.1) rotate(2deg); opacity: 1; } }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Vẽ bánh */
        .cake { width: 300px; height: 120px; background: #ffb6c1; border-radius: 15px 15px 10px 10px; position: relative; box-shadow: inset 0 -20px rgba(0,0,0,0.1), 0 10px 20px rgba(0,0,0,0.3); z-index: 1; }
        .icing { position: absolute; top: 0; left: 0; width: 100%; height: 40px; background: #fff; border-radius: 15px 15px 20px 20px; }
        .icing-drips { position: absolute; top: 20px; width: 30px; height: 50px; background: #fff; border-radius: 30px; }
        .drip-1 { left: 20px; height: 45px; } .drip-2 { left: 80px; height: 60px; } .drip-3 { left: 150px; height: 40px; } .drip-4 { left: 210px; height: 65px; } .drip-5 { left: 260px; height: 35px; }
        .plate { width: 400px; height: 30px; background: #dcdcdc; border-radius: 50%; position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%); box-shadow: 0 15px 20px rgba(0,0,0,0.4); z-index: 0; }
    </style>
</head>
<body>

    <div id="setup-screen" class="screen">
        <h1>Chuẩn bị bánh sinh nhật 🎂</h1>
        <div class="input-group">
            <input type="text" id="nameInput" placeholder="Tên người nhận">
        </div>
        <div class="input-group">
            <input type="number" id="ageInput" placeholder="Số tuổi (số nến)">
        </div>
        <button id="startBtn">Đốt Nến & Bắt Đầu!</button>
    </div>

    <div id="cake-screen" class="screen hidden">
        <h1 id="birthdayText" class="birthday-text">Happy Birthday, <br><span id="nameDisplay"></span>!</h1>
        <div class="cake-container">
            <div class="candles" id="candlesContainer"></div>
            <div class="cake">
                <div class="icing"></div>
                <div class="icing-drips drip-1"></div><div class="icing-drips drip-2"></div><div class="icing-drips drip-3"></div><div class="icing-drips drip-4"></div><div class="icing-drips drip-5"></div>
            </div>
            <div class="plate"></div>
        </div>
        <div class="instructions" id="instructionsText">Đưa miệng sát micro và <strong>THỔI MẠNH</strong> nhé! 💨</div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const setupScreen = document.getElementById('setup-screen');
        const cakeScreen = document.getElementById('cake-screen');
        const candlesContainer = document.getElementById('candlesContainer');
        const nameDisplay = document.getElementById('nameDisplay');
        const birthdayText = document.getElementById('birthdayText');
        const instructionsText = document.getElementById('instructionsText');

        let audioContext; let analyser; let microphone; let isBlown = false;

        startBtn.addEventListener('click', async () => {
            const name = document.getElementById('nameInput').value || 'bạn';
            let age = parseInt(document.getElementById('ageInput').value) || 1;
            if (age > 50) age = 50; 
            
            nameDisplay.innerText = name;
            candlesContainer.innerHTML = '';
            for(let i=0; i<age; i++) {
                const candle = document.createElement('div'); candle.className = 'candle';
                const flame = document.createElement('div'); flame.className = 'flame';
                candle.style.height = (40 + Math.random() * 15) + 'px';
                candle.appendChild(flame); candlesContainer.appendChild(candle);
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                setupAudio(stream);
                setupScreen.classList.add('hidden');
                cakeScreen.classList.remove('hidden');
                listenToBlow();
            } catch (err) { alert("Bạn cần bấm 'Cho phép' (Allow) sử dụng Micro thì mới thổi nến được nhé!"); }
        });

        function setupAudio(stream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            microphone = audioContext.createMediaStreamSource(stream);
            microphone.connect(analyser); analyser.fftSize = 256;
        }

        function listenToBlow() {
            if (isBlown) return;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);
            let sum = 0; for (let i = 0; i < bufferLength; i++) sum += dataArray[i];
            let average = sum / bufferLength;

            // Chỉnh độ nhạy tiếng thổi ở đây (mặc định > 80 là ok)
            if (average > 80) blowOutCandles(); else requestAnimationFrame(listenToBlow);
        }

        function blowOutCandles() {
            isBlown = true;
            const flames = document.querySelectorAll('.flame');
            flames.forEach(flame => { flame.style.opacity = '0'; flame.style.transform = 'translateX(-50%) scale(0)'; });
            instructionsText.style.display = 'none';
            birthdayText.classList.add('show-text');
        }
    </script>
</body>
</html>
